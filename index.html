<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 我的黏土小游戏合集</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        :root {
            --bg-color: #f5f0e8;
            --clay-shadow: 6px 6px 0px rgba(0, 0, 0, 0.06);
            --paper-white: #ffffff;
            --text-main: #5d4a3e;
            --accent-orange: #ff9d5c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            font-family: 'ZCOOL KuaiLe', 'PingFang SC', sans-serif;
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部装饰 */
        header {
            text-align: center;
            margin: 20px 0 35px;
        }
        h1 {
            font-size: 2rem;
            background: #fff;
            padding: 12px 25px;
            border-radius: 25px 15px 30px 18px;
            box-shadow: var(--clay-shadow);
            display: inline-block;
            transform: rotate(-1deg);
        }
        .subtitle {
            margin-top: 15px;
            font-size: 1rem;
            color: #8e7a6d;
            letter-spacing: 1px;
        }

        /* 游戏网格 */
        #game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2列 */
            gap: 18px;
            width: 100%;
            max-width: 420px;
        }

        /* 黏土卡片样式 */
        .game-card {
            background: var(--paper-white);
            border-radius: 24px;
            padding: 15px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--clay-shadow);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid transparent;
            position: relative;
        }

        /* 点击/悬停动画 */
        .game-card:active {
            transform: scale(0.92) translateY(5px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        /* 即将上线/灰色状态 */
        .game-card.coming-soon {
            background: #f0edeb;
            filter: grayscale(0.8);
            opacity: 0.7;
            pointer-events: none;
        }

        .game-emoji {
            font-size: 3rem;
            margin-bottom: 12px;
            filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.1));
        }

        .game-info {
            text-align: center;
        }

        .game-title {
            font-weight: 900;
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #3e2d2b;
        }

        .game-desc {
            font-size: 0.8rem;
            line-height: 1.4;
            color: #8e7a6d;
        }

        /* 底部 */
        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9rem;
            color: #bcaaa4;
            text-align: center;
        }

        /* 手机适配细调 */
        @media (max-width: 360px) {
            #game-grid { grid-template-columns: 1fr; }
            .game-card { min-height: 120px; flex-direction: row; gap: 20px; text-align: left; }
            .game-emoji { margin-bottom: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎨 黏土游戏馆</h1>
        <div class="subtitle">互动成语 · 英语猜谜 · 趣味挑战</div>
    </header>

    <!-- 游戏入口自动填充区 -->
    <main id="game-grid"></main>

    <footer>
        🎁 想要定制专属游戏？私讯我获取更多
    </footer>

    <script>
        /**
         * ════════════════════════════════════════════════
         * 🛠️ 开发者配置区
         * 你只需要在这里增加对象，首页就会自动多出一个卡片入口
         * ════════════════════════════════════════════════
         */
        const games = [
            {
                emoji: '🐰',
                name: '守株待兔',
                desc: '成语故事动画 · 动态交互',
                url: 'shouzhu-daitu.html',
                status: 'active'
            },
            {
                emoji: '🐦',
                name: '乌鸦喝水',
                desc: '物理模拟动画 · 趣味寓言',
                url: 'crow-water.html',
                status: 'active'
            },
            {
                emoji: '🐱',
                name: '英语单词',
                desc: '动物篇 · 黏土捏造挑战',
                url: 'animals.html',
                status: 'active'
            },
            {
                emoji: '📜',
                name: '猜古诗词',
                desc: '皮影戏风格 · 正在制作',
                url: '#',
                status: 'upcoming' // 设为 upcoming 会变灰色且不可点
            },
            {
                emoji: '🔤',
                name: 'Emoji成语',
                desc: '看表情包猜成语 · 敬请期待',
                url: '#',
                status: 'upcoming'
            },
            // 如果你又做了一个新游戏，直接在这里复制一行即可：
            // { emoji: '🍎', name: '单词接龙', desc: '水果篇', url: 'fruits.html', status: 'active' },
        ];

        // ════════════════════════════════════════════════
        // 渲染逻辑 (不需要动)
        const grid = document.getElementById('game-grid');

        function init() {
            grid.innerHTML = games.map(game => `
                <a href="${game.url}" class="game-card ${game.status === 'upcoming' ? 'coming-soon' : ''}">
                    <div class="game-emoji">${game.emoji}</div>
                    <div class="game-info">
                        <div class="game-title">${game.name}</div>
                        <div class="game-desc">${game.desc}</div>
                    </div>
                </a>
            `).join('');
        }

        init();
    </script>
</body>
</html>
