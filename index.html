<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎭 英語單字猜謎：皮影戲動物篇</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

        :root {
            --bg-color: #1a1110;
            --leather: #3e2723;
            --amber-light: #f7e1a3;
            --amber-dark: #d9a044;
            --accent-red: #b71c1c;
            --text-color: #f7e1a3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            font-family: 'Noto Serif TC', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        /* 舞台區域 */
        #stage-container {
            position: relative;
            width: 100%;
            max-width: 414px;
            height: 65vh;
            background: radial-gradient(circle, var(--amber-light) 0%, var(--amber-dark) 100%);
            border: 10px solid #2a1b1a;
            border-bottom-width: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            margin-top: 10px;
            overflow: hidden;
        }

        /* 幕布紋理動畫 */
        #curtain-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/p6-mini.png');
            opacity: 0.15;
            pointer-events: none;
            animation: curtainWave 10s infinite alternate ease-in-out;
            z-index: 5;
        }
        @keyframes curtainWave {
            from { transform: scale(1) translateX(-2px); }
            to { transform: scale(1.05) translateX(2px); }
        }

        /* 狀態標籤 */
        #status-bar {
            position: absolute; top: 15px; left: 15px;
            font-size: 0.9rem; font-weight: 900; color: var(--leather);
            z-index: 10;
        }

        #hint-text {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-weight: 600; color: var(--leather); opacity: 0; transition: 0.5s;
            z-index: 10; padding: 0 20px;
        }

        /* 皮影共通組件 */
        .puppet-container {
            position: absolute;
            top: 50%; left: 150%; /* 初始在場外 */
            transform: translate(-50%, -50%);
            transition: left 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rod {
            width: 2px; height: 300px;
            background: rgba(0,0,0,0.2);
            position: absolute; bottom: 50%;
            transform-origin: bottom center;
        }

        .puppet-svg {
            fill: var(--leather);
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.4));
            animation: idleSway 4s infinite ease-in-out;
        }
        
        /* 鏤空效果模擬 */
        .hollow { fill: var(--amber-light); opacity: 0.8; }

        @keyframes idleSway {
            0%, 100% { transform: rotate(-1deg) translateY(0); }
            50% { transform: rotate(1deg) translateY(-5px); }
        }

        .part { opacity: 0; transition: opacity 0.8s; }
        .show { opacity: 1 !important; }

        /* UI 面板 */
        #ui-panel {
            width: 100%; max-width: 414px;
            padding: 20px; flex-grow: 1;
            display: flex; flex-direction: column;
            justify-content: flex-start; gap: 15px;
            background: #251a19;
            border-top: 4px solid var(--amber-dark);
            z-index: 20;
        }

        #input-area {
            display: none; transform: translateY(50px);
            opacity: 0; transition: all 0.5s;
        }

        #word-input {
            width: 100%; height: 50px;
            background: #3e2d2b; border: 2px solid var(--amber-dark);
            border-radius: 10px; color: var(--amber-light);
            text-align: center; font-size: 1.2rem; outline: none;
            margin-bottom: 10px;
        }

        #guess-btn {
            width: 100%; height: 50px;
            background: var(--amber-dark); border: none;
            border-radius: 10px; color: var(--leather);
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
        }

        /* 答對動畫效果 */
        .correct-glow { animation: successFlash 1s forwards; }
        @keyframes successFlash {
            0% { background: var(--amber-light); }
            50% { background: #fff; }
            100% { background: radial-gradient(circle, #fff 0%, var(--amber-light) 100%); }
        }

        /* 畫面提示文字 */
        #overlay-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: 900; color: var(--leather);
            text-shadow: 0 0 20px #fff; z-index: 100; pointer-events: none;
            text-align: center; display: none;
        }

        /* 右上角按鈕 */
        #pronounce-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.1); border: 1px solid var(--leather);
            color: var(--leather); border-radius: 20px; padding: 2px 10px;
            font-size: 0.8rem; cursor: pointer; z-index: 10;
        }

        /* 各種屏幕狀態 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 200; background: var(--bg-color);
            text-align: center; padding: 30px;
        }

        #start-screen { background: radial-gradient(circle, #3e2723 0%, #1a1110 100%); cursor: pointer; }
        
        h1 { font-size: 2rem; margin-bottom: 10px; color: var(--amber-light); }
        .btn-large {
            margin-top: 30px; padding: 15px 40px; background: var(--accent-red);
            color: white; border-radius: 30px; border: none; font-weight: bold; font-size: 1.2rem;
        }

        .error-shake { animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .jump-spin { animation: jumpSpin 1s ease-out; }
        @keyframes jumpSpin {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -80%) scale(1.2) rotate(180deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); }
        }

    </style>
</head>
<body>

    <!-- 開始畫面 -->
    <div id="start-screen" class="screen" onclick="startGame()">
        <div style="font-size: 4rem; margin-bottom: 20px;">🎭</div>
        <h1>猜猜英語單字！</h1>
        <h2 style="color: var(--amber-dark);">Animals 動物篇</h2>
        <p style="margin-top: 20px; opacity: 0.7;">看皮影戲，猜英語單字</p>
        <p style="margin-top: 10px; font-weight: bold;">共 8 關</p>
        <div style="margin-top: 40px; animation: pulse 2s infinite;">點擊螢幕任意位置開始</div>
    </div>

    <!-- 通關畫面 -->
    <div id="end-screen" class="screen" style="display:none;">
        <h1 id="end-title">🎉 恭喜通關！</h1>
        <div id="score-report" style="font-size: 1.2rem; margin: 20px 0;"></div>
        <button class="btn-large" onclick="location.reload()">🔄 再玩一次</button>
        <button class="btn-large" style="background: #444; margin-top: 10px;" onclick="alert('感謝支持！定制主題請聯絡我們。')">🎁 想要更多主題？</button>
    </div>

    <!-- 舞台 -->
    <div id="stage-container">
        <div id="curtain-texture"></div>
        <div id="status-bar">第 <span id="current-idx">1</span> / 8 關</div>
        <button id="pronounce-btn" onclick="showPronunciation()">🔊 發音</button>
        <div id="hint-text"></div>
        <div id="overlay-msg"></div>

        <!-- 動物皮影容器 (動態注入) -->
        <div id="puppet-world"></div>
    </div>

    <!-- 交互面板 -->
    <div id="ui-panel">
        <div id="input-area">
            <input type="text" id="word-input" placeholder="輸入英語單字 👇" autocomplete="off" stroke="none">
            <button id="guess-btn" onclick="checkAnswer()">猜！</button>
        </div>
    </div>

    <script>
        const animals = [
            {
                word: 'cat',
                phonetic: '卡特',
                hint: '牠會喵喵叫，喜歡抓老鼠～',
                svg: `
                    <svg class="puppet-svg" width="160" height="160" viewBox="0 0 160 160">
                        <path class="part p1" d="M80 100 A 30 30 0 1 0 80 40 A 30 30 0 1 0 80 100 M60 50 L50 30 L70 45 Z M100 50 L110 30 L90 45 Z" />
                        <path class="part p2" d="M110 90 Q 140 90 140 60 Q 140 40 130 40" fill="none" stroke="#3e2723" stroke-width="6" />
                        <g class="part p3">
                            <rect x="65" y="100" width="10" height="30" />
                            <rect x="85" y="100" width="10" height="30" />
                            <line x1="50" y1="75" x2="30" y2="70" stroke="#3e2723" stroke-width="2" />
                            <line x1="50" y1="80" x2="30" y2="80" stroke="#3e2723" stroke-width="2" />
                            <line x1="110" y1="75" x2="130" y2="70" stroke="#3e2723" stroke-width="2" />
                        </g>
                    </svg>`
            },
            {
                word: 'dog',
                phonetic: '多格',
                hint: '人類最好的朋友，會汪汪叫～',
                svg: `
                    <svg class="puppet-svg" width="160" height="160" viewBox="0 0 160 160">
                        <g class="part p1">
                            <circle cx="80" cy="70" r="35" />
                            <path d="M50 50 Q 40 70 50 90 M110 50 Q 120 70 110 90" fill="none" stroke="#3e2723" stroke-width="12" stroke-linecap="round" />
                        </g>
                        <path class="part p2" d="M115 100 Q 130 80 150 100" fill="none" stroke="#3e2723" stroke-width="8" stroke-linecap="round" />
                        <g class="part p3">
                            <rect x="60" y="105" width="12" height="35" />
                            <rect x="88" y="105" width="12" height="35" />
                            <path d="M75 95 Q 80 115 85 95" fill="#f7e1a3" />
                        </g>
                    </svg>`
            },
            {
                word: 'elephant',
                phonetic: '愛勒粉特',
                hint: '陸地上最大的動物，鼻子會噴水～',
                svg: `
                    <svg class="puppet-svg" width="200" height="200" viewBox="0 0 200 200">
                        <ellipse class="part p1" cx="100" cy="100" rx="60" ry="50" />
                        <path class="part p2" d="M40 90 Q 10 90 10 130 Q 10 150 30 145" fill="none" stroke="#3e2723" stroke-width="15" stroke-linecap="round" />
                        <g class="part p3">
                            <circle cx="55" cy="80" r="25" />
                            <rect x="70" y="140" width="20" height="40" />
                            <rect x="110" y="140" width="20" height="40" />
                        </g>
                    </svg>`
            },
            {
                word: 'bird',
                phonetic: '柏德',
                hint: '牠有羽毛，會在天上飛～',
                svg: `
                    <svg class="puppet-svg" width="160" height="160" viewBox="0 0 160 160">
                        <ellipse class="part p1" cx="80" cy="90" rx="30" ry="20" />
                        <g class="part p2">
                            <path d="M80 75 L120 40 L110 75 Z" />
                            <path d="M80 75 L40 40 L50 75 Z" />
                        </g>
                        <g class="part p3">
                            <circle cx="80" cy="65" r="15" />
                            <path d="M95 65 L110 65 L95 70 Z" />
                        </g>
                    </svg>`
            },
            {
                word: 'fish',
                phonetic: '非漆',
                hint: '牠住在水裡，會吐泡泡～',
                svg: `
                    <svg class="puppet-svg" width="160" height="160" viewBox="0 0 160 160">
                        <path class="part p1" d="M30 80 Q 80 40 130 80 Q 80 120 30 80" />
                        <g class="part p2">
                            <path d="M130 80 L155 60 L155 100 Z" />
                            <path d="M80 55 L95 40 L70 40 Z" />
                        </g>
                        <g class="part p3">
                            <circle class="hollow" cx="45" cy="75" r="3" />
                            <circle cx="20" cy="60" r="5" fill="none" stroke="#3e2723" stroke-width="1" />
                            <circle cx="10" cy="40" r="3" fill="none" stroke="#3e2723" stroke-width="1" />
                        </g>
                    </svg>`
            },
            {
                word: 'rabbit',
                phonetic: '軟鼻特',
                hint: '耳朵很長，喜歡吃胡蘿蔔～',
                svg: `
                    <svg class="puppet-svg" width="160" height="160" viewBox="0 0 160 160">
                        <circle class="part p1" cx="80" cy="100" r="30" />
                        <g class="part p2">
                            <circle cx="80" cy="65" r="18" />
                            <ellipse cx="72" cy="30" rx="6" ry="25" />
                            <ellipse cx="88" cy="30" rx="6" ry="25" />
                        </g>
                        <g class="part p3">
                            <circle cx="110" cy="100" r="8" />
                            <path d="M60 125 Q 70 140 80 125 M90 125 Q 100 140 110 125" fill="none" stroke="#3e2723" stroke-width="5" stroke-linecap="round" />
                        </g>
                    </svg>`
            },
            {
                word: 'panda',
                phonetic: '盼打',
                hint: '中國的國寶，只有黑白色～',
                svg: `
                    <svg class="puppet-svg" width="180" height="180" viewBox="0 0 180 180">
                        <circle class="part p1" cx="90" cy="100" r="50" />
                        <g class="part p2">
                            <circle cx="90" cy="55" r="35" />
                            <circle cx="70" cy="55" r="8" class="hollow" />
                            <circle cx="110" cy="55" r="8" class="hollow" />
                        </g>
                        <g class="part p3">
                            <circle cx="65" cy="35" r="12" />
                            <circle cx="115" cy="35" r="12" />
                            <rect x="55" y="140" width="25" height="30" rx="10" />
                            <rect x="100" y="140" width="25" height="30" rx="10" />
                        </g>
                    </svg>`
            },
            {
                word: 'butterfly',
                phonetic: '巴特非',
                hint: '毛毛蟲長大後變成的，有漂亮的翅膀～',
                svg: `
                    <svg class="puppet-svg" width="180" height="180" viewBox="0 0 180 180">
                        <rect class="part p1" x="87" y="50" width="6" height="80" rx="3" />
                        <path class="part p2" d="M90 90 Q 160 30 160 90 Q 160 150 90 90" />
                        <g class="part p3">
                            <path d="M90 90 Q 20 30 20 90 Q 20 150 90 90" />
                            <circle class="hollow" cx="130" cy="70" r="8" />
                            <circle class="hollow" cx="130" cy="110" r="8" />
                            <circle class="hollow" cx="50" cy="70" r="8" />
                            <circle class="hollow" cx="50" cy="110" r="8" />
                        </g>
                    </svg>`
            }
        ];

        let currentIndex = 0;
        let wrongCount = 0;
        let hintCount = 0;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            loadLevel();
        }

        function loadLevel() {
            const world = document.getElementById('puppet-world');
            const data = animals[currentIndex];
            wrongCount = 0;
            
            // 重置 UI
            document.getElementById('current-idx').innerText = currentIndex + 1;
            document.getElementById('hint-text').style.opacity = 0;
            document.getElementById('word-input').value = '';
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('stage-container').classList.remove('correct-glow');

            // 注入動物
            world.innerHTML = `
                <div class="puppet-container" id="current-puppet">
                    <div class="rod"></div>
                    ${data.svg}
                </div>
            `;

            const puppet = document.getElementById('current-puppet');

            // 線索節奏
            setTimeout(() => { puppet.style.left = '50%'; }, 500);
            setTimeout(() => { puppet.querySelector('.p1').classList.add('show'); }, 1500);
            setTimeout(() => { puppet.querySelector('.p2').classList.add('show'); }, 3500);
            setTimeout(() => { puppet.querySelector('.p3').classList.add('show'); }, 5500);
            
            setTimeout(() => {
                const inputArea = document.getElementById('input-area');
                inputArea.style.display = 'block';
                setTimeout(() => {
                    inputArea.style.opacity = '1';
                    inputArea.style.transform = 'translateY(0)';
                }, 50);
            }, 7500);
        }

        function checkAnswer() {
            const input = document.getElementById('word-input').value.trim().toLowerCase();
            const correct = animals[currentIndex].word;
            const stage = document.getElementById('stage-container');

            if (input === correct) {
                handleCorrect();
            } else {
                handleWrong();
            }
        }

        function handleCorrect() {
            const msg = document.getElementById('overlay-msg');
            const stage = document.getElementById('stage-container');
            const puppet = document.getElementById('current-puppet');
            const data = animals[currentIndex];

            stage.classList.add('correct-glow');
            puppet.classList.add('jump-spin');
            
            msg.innerHTML = `✅ 正確！<br>${data.word} 🐾<br><small style="font-size:1rem">${animals[currentIndex].phonetic}</small>`;
            msg.style.display = 'block';

            setTimeout(() => {
                msg.style.display = 'none';
                currentIndex++;
                if (currentIndex < animals.length) {
                    loadLevel();
                } else {
                    showEndScreen();
                }
            }, 2000);
        }

        function handleWrong() {
            const stage = document.getElementById('stage-container');
            const input = document.getElementById('word-input');
            const hintTxt = document.getElementById('hint-text');
            
            wrongCount++;
            hintCount++;
            
            stage.classList.add('error-shake');
            stage.style.background = 'radial-gradient(circle, #ff4444 0%, var(--amber-dark) 100%)';
            
            if (navigator.vibrate) navigator.vibrate(200);

            setTimeout(() => {
                stage.classList.remove('error-shake');
                stage.style.background = '';
            }, 300);

            if (wrongCount >= 3) {
                input.value = animals[currentIndex].word;
                alert(`正確答案是：${animals[currentIndex].word}`);
                handleCorrect();
                return;
            }

            hintTxt.innerText = `💡 提示：${animals[currentIndex].hint}`;
            hintTxt.style.opacity = 1;
            input.value = '';
            input.focus();
        }

        function showPronunciation() {
            const data = animals[currentIndex];
            alert(`單字：${data.word}\n中文諧音：${data.phonetic}`);
        }

        function showEndScreen() {
            document.getElementById('stage-container').style.display = 'none';
            document.getElementById('ui-panel').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('score-report').innerText = `答對 8 / 8 關\n總共使用了 ${hintCount} 次提示`;
        }

        // 支援 Enter 鍵
        document.getElementById('word-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
